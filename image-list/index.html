                'https://user-images.githubusercontent.com/45512970/195116704-014651e9-e112-46d6-af7c-0c8048310cba.jpg',
                'https://user-images.githubusercontent.com/45512970/195116716-205015a6-471d-4e3e-b43e-6c94d2f81175.jpg',
            ],
        },
    ];

    const galleryContainer = document.getElementById('gallery-container');
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('content-modal');
    const modalClose = document.getElementById('modal-close');

    // 关闭模态框
    modalClose.onclick = function() {
        modal.style.display = "none";
        modalContent.innerHTML = "";  // 清空内容
    }

    // 点击空白区域也关闭模态框
    // window.onclick = function(event) {
    //     if (event.target === modal) {
    //         modal.style.display = "none";
    //         modalContent.innerHTML = "";
    //     }
    // }

    imageList.reverse().forEach(function(image) {
        const galleryItem = document.createElement('div');
        galleryItem.classList.add('gallery-item');
        galleryItem.setAttribute('id', 'propotion');
        galleryItem.innerHTML = `
        <a>
        <img src="${image.src}" style="width:100%;border-radius:20px">
        </a>
        <div style="text-align:center;background: rgba(255, 255, 255, .3);border-radius: 7px;border: 1px solid $black-deep;">
        - ${image.title} -
        </div>
        `;
        
        // 绑定点击事件，打开模态框
        galleryItem.onclick = function() {
            modal.style.display = "block";
            document.querySelector('.modal-header h2').innerText = image.title;
            let modalHTML = '';

            // 添加图片列表
            if (image.imageList && image.imageList.length) {
                image.imageList.forEach(img => {
                    modalHTML += `<img src="${img}" style="width:60%; display:block; margin: 10px auto;border-radius:20px">`;
                });
            }

            // 添加视频列表
            if (image.videoList && image.videoList.length) {
                image.videoList.forEach(video => {
                    modalHTML += `<video controls style="width:60%; display:block; margin: 10px auto;border-radius:20px">
                                    <source src="${video}" type="video/mp4">
                                    Your browser does not support the video tag.</video>`;
                });
            }

            modalContent.innerHTML = modalHTML; // 将内容插入模态框
        };

        galleryContainer.appendChild(galleryItem);
    });


</script>

<style>
    #propotion {
        border: 1.5px;
        width: 50%;
        padding: 10px;
        margin: auto;
    }

    .gallery-page {
        margin-top: -50px;
    }

    .gallery-list {
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: flex-start;
    }

    .gallery-column {
        display: flex;
        flex-direction: column-reverse;
    }
    .gallery-column :hover {
        cursor:pointer;
    }
    .gallery-item {
        margin-bottom: -50px;
    }

    .gallery-column a img {
        height: 250px;
        width: 300px;
        object-fit: cover;
    }

    /* 模态框样式 */
    .modal {
        display: none;
        position: fixed;
        z-index: 1;
        padding-top: 60px;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.8);
    }

    .modal-content {
        margin: auto;
        padding: 25px;
        width: 50%;
        background-color: #fefefe;
        margin-bottom: 150px;
    }

    .close {
        position: absolute;
        top: 15px;
        right: 35px;
        color: #aaa;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
    }

    .close:hover, .close:focus {
        color: #000;
        text-decoration: none;
        cursor: pointer;
    }
</style>

</html>
