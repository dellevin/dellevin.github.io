              <script>
                 function getColor() {
                    var re = "#";
                    // 选择一个较浅的范围，例如从 180 到 220
                    for (var xunhuan = 0; xunhuan < 3; xunhuan++) {
                    // 生成一个介于 180 和 220 之间的随机数
                    var temp = Math.floor(Math.random() * 41) + 180;
                    temp = temp.toString(16);
                    // 如果转换后的十六进制数长度不足两位，则补零
                    if (temp.length === 1) {
                        temp = "0" + temp;
                    }
                    re += temp;
                    }
                    return re;
                }
                for (xunhuan = 0; xunhuan <= global_tags_random; xunhuan++) {
                  var temp = document.getElementById(
                    "tag-" + xunhuan.toString()
                  );
                  temp.style.backgroundColor = getColor();
                  temp.style.color = "#000"; // 设置字体颜色为黑色
                }
